<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Forgot Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
</head>
<body>
    <!-- HEADER -->
    <div th:replace="fragments/header :: header"></div>

    <!-- NAVBAR -->
    <div th:replace="fragments/navbar :: navbar"></div>

    <div class="container mt-5" style="max-width: 400px;">
        <h3>Set New Password</h3>
        <form th:action="@{/forgot-password/update}" method="post">
            <input type="hidden" name="token" th:value="${token}">
            
            <label>New Password</label>
            <input type="password" name="password" class="form-control mb-2" required minlength="6">
            
            <label>Confirm Password</label>
            <input type="password" name="confirmPassword" class="form-control mb-3" required>
            
            <button type="submit" class="btn btn-success w-100">Update Password</button>
        </form>
        <div th:if="${error}" class="alert alert-danger mt-3" th:text="${error}"></div>
    </div>

    <!-- FOOTER -->
    <div th:replace="fragments/footer :: footer"></div>
</body>
</html>
