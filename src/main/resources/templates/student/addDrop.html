<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Course Add/Drop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" th:href="@{/css/styleSrs.css}">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <style>
        .hidden-section { display: none; }
        .table-card { border: 1px solid #dee2e6; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
    </style>
</head>
<body>
<!-- HEADER -->
<div th:replace="fragments/header :: header"></div>

<!-- NAVBAR -->
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5">
    <h2 class="mb-4">Course Add/Drop Portal</h2>
    
    <form th:action="@{/student/submitAddDrop}" method="post">
        
        <div class="card p-3 mb-4">
            <label class="fw-bold">How many courses do you want to add?</label>
            <input type="number" name="addCount" id="addCount" 
                   class="form-control w-25" min="0" max="4" value="0" >
        </div>

        <div th:each="i : ${#numbers.sequence(1, 4)}" 
                th:id="'addDiv' + ${i}" >
            <label th:text="'Select course you want to add (Choice ' + ${i} + ')'"></label>
            <select name="addTcrids" class="form-select">
                <option value="">-- Select Course --</option>
                <option th:each="crs : ${canAdd}" 
                        th:value="${crs[0]}" 
                        th:text="${crs[0]} + ' | ' + ${crs[1]} + ' | ' + ${crs[2]}"></option>
            </select>
        </div>

        <h4 class="mb-3">Course Replacement (Max 3 Drops)</h4>
        <div th:each="tIdx : ${#numbers.sequence(1, 3)}" class="table-card bg-white shadow-sm">
            <h5>Drop Table <span th:text="${tIdx}"></span></h5>
            
            <div class="row">
                <div class="col-md-12 mb-3">
                    <label class="text-danger fw-bold">Select course you want to DROP:</label>
                    <select th:name="'dropId' + ${tIdx}" class="form-select border-danger">
                        <option value="">-- None --</option>
                        <option th:each="crs : ${canDrop}" 
                                th:value="${crs[0]}" 
                                th:text="${crs[0]} + ' | ' + ${crs[1]} + ' | ' + ${crs[2]}"></option>
                    </select>
                </div>

                <div class="col-md-4" th:each="rIdx : ${#numbers.sequence(1, 3)}">
                    <label class="small">Replace Choice <span th:text="${rIdx}"></span></label>
                    <select th:name="'replaceIds' + ${tIdx}" class="form-select">
                        <option value="">-- Select Replacement --</option>
                        <option th:each="crs : ${canAdd}" 
                                th:value="${crs[0]}" 
                                th:text="${crs[0]} + ' | ' + ${crs[1]} + ' | ' + ${crs[2]}"></option>
                    </select>
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-primary btn-lg mt-3">Submit Changes</button>
    </form>
</div>

<!-- FOOTER -->
<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
