<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>View Course Add/Drop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" th:href="@{/css/styleSrs.css}">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
</head>
<body>
<!-- HEADER -->
<div th:replace="fragments/header :: header"></div>

<!-- NAVBAR -->
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Your Add/Drop Preferences</h2>
    </div>

    <div class="card mb-4 shadow-sm">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">Courses to Add (Count: <span th:text="${prefs.addcount}"></span>)</h5>
        </div>
        <div class="card-body">
            <ul class="list-group list-group-flush">
                <li class="list-group-item" th:if="${prefs.addp1 != null and courseDetails.containsKey(prefs.addp1)}" th:text="${courseDetails[prefs.addp1][0] + ' - ' + courseDetails[prefs.addp1][1] + ' - ' + courseDetails[prefs.addp1][2]}"></li>
                <li class="list-group-item" th:if="${prefs.addp2 != null and courseDetails.containsKey(prefs.addp2)}" th:text="${courseDetails[prefs.addp2][0] + ' - ' + courseDetails[prefs.addp2][1] + ' - ' + courseDetails[prefs.addp2][2]}"></li>
                <li class="list-group-item" th:if="${prefs.addp3 != null and courseDetails.containsKey(prefs.addp3)}" th:text="${courseDetails[prefs.addp3][0] + ' - ' + courseDetails[prefs.addp3][1] + ' - ' + courseDetails[prefs.addp3][2]}"></li>
                <li class="list-group-item" th:if="${prefs.addp4 != null and courseDetails.containsKey(prefs.addp4)}" th:text="${courseDetails[prefs.addp4][0] + ' - ' + courseDetails[prefs.addp4][1] + ' - ' + courseDetails[prefs.addp4][2]}"></li>
                <li class="list-group-item text-muted" th:if="${prefs.addcount == 0}">No courses selected for adding.</li>
            </ul>
        </div>
    </div>

    <h4 class="mb-3">Course Replacements</h4>
    <div class="row">
        <div class="col-md-4" th:each="i : ${#numbers.sequence(1,3)}">
            <div class="card mb-4 shadow-sm border-danger">
                <div class="card-header bg-danger text-white">
                    <strong th:text="'Drop Choice ' + ${i}"></strong>
                </div>
                <div class="card-body">
                    <p class="fw-bold text-danger" th:with="dropId=${i==1 ? prefs.drop1 : (i==2 ? prefs.drop2 : prefs.drop3)}">
                        <span th:if="${dropId != null and courseDetails != null and courseDetails.containsKey(dropId)}" th:text="${courseDetails.get(dropId)[0] + ' - ' + courseDetails.get(dropId)[1] + ' - ' + courseDetails.get(dropId)[2]}"></span>
                        <span th:unless="${dropId != null and courseDetails.containsKey(dropId)}">None</span>
                    </p>
                    <hr>
                    <p class="small text-muted mb-1">Replacements (In order):</p>
                    <ol class="ps-3">
                        <li th:with="rId=${i == 1 ? prefs.drop1_p1 : (i == 2 ? prefs.drop2_p1 : prefs.drop3_p1)}">
                            
                            <span th:if="${courseDetails.containsKey(rId)}" 
                                th:text="${courseDetails.get(rId)[0] + ' - ' + courseDetails.get(rId)[1] + ' - ' + courseDetails.get(rId)[2]}"></span>
                            
                            <span th:unless="${courseDetails.containsKey(rId)}" 
                                th:text="${rId + ' N/A'}"></span>
                        </li>

                        <li th:with="rId=${i == 1 ? prefs.drop1_p2 : (i == 2 ? prefs.drop2_p2 : prefs.drop3_p2)}">
                            <span th:if="${courseDetails.containsKey(rId)}" 
                                th:text="${courseDetails.get(rId)[0] + ' - ' + courseDetails.get(rId)[1] + ' - ' + courseDetails.get(rId)[2]}"></span>
                            
                            <span th:unless="${courseDetails.containsKey(rId)}" 
                                th:text="${rId + ' N/A'}"></span>
                        </li>

                        <li th:with="rId=${i == 1 ? prefs.drop1_p3 : (i == 2 ? prefs.drop2_p3 : prefs.drop3_p3)}">
                            <span th:if="${courseDetails.containsKey(rId)}" 
                                th:text="${courseDetails.get(rId)[0] + ' - ' + courseDetails.get(rId)[1] + ' - ' + courseDetails.get(rId)[2]}"></span>
                            
                            <span th:unless="${courseDetails.containsKey(rId)}" 
                                th:text="${rId + ' N/A'}"></span>
                        </li>
                    </ol>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- FOOTER -->
<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
