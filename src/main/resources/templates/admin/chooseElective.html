<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Open For</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
</head>


<body>

<!-- HEADER -->
<div th:replace="fragments/header :: header"></div>

<!-- NAVBAR -->
<div th:replace="fragments/navbar :: navbar"></div>

    <div class="container-lg my-5">
        <div class="card shadow">
            <div class="card-header bg-dark text-white">
                <h4 th:text="'Select Courses for ' + ${electiveName}"></h4>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/openfor/saveElective}" method="post">
                    <input type="hidden" name="batch" th:value="${batch}">
                    <input type="hidden" name="program" th:value="${program}">
                    <input type="hidden" name="termId" th:value="${termId}">
                    <input type="hidden" name="electiveCode" th:value="${electiveCode}">

                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>S.No</th>
                                <th>Code</th>
                                <th>Course Name</th>
                                <th>L-T-P-C</th>
                                <th>Select</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="tca, iter : ${courses}">
                                <td th:text="${iter.count}"></td>
                                <td th:text="${tca.termCourse.course.crscode}"></td>
                                <td th:text="${tca.termCourse.course.crsname}"></td>
                                <td th:text="|${tca.termCourse.course.crslectures}-${tca.termCourse.course.crstutorials}-${tca.termCourse.course.crspracticals}-${tca.termCourse.course.crscreditpoints}|"></td>
                                <td>
                                    <input type="checkbox" name="selectedTcaIds" th:value="${tca.tcaid}" class="form-check-input">
                                </td>
                            </tr>
                        </tbody>
                    </table>

                    <div class="d-flex justify-content-between mt-4">
                        <button type="submit"
                                formaction="/admin/openfor/reload"
                                class="btn btn-secondary">
                            Cancel
                        </button>
                        <button type="submit" class="btn btn-primary">Add Selected Courses</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div th:replace="fragments/footer :: footer"></div>
</body>
</html>
