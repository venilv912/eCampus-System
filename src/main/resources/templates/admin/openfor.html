<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Open For</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
</head>


<body>

<!-- HEADER -->
<div th:replace="fragments/header :: header"></div>

<!-- NAVBAR -->
<div th:replace="fragments/navbar :: navbar"></div>

    
    <div class="card shadow p-4">
        <div class="row align-items-end">
            <input type="hidden" id="currTermId" th:value="${currTermId}">

            <div class="col-md-4">
                <label class="form-label fw-bold">Select Program</label>
                <select id="programSelect" class="form-select" onchange="fetchBatches()">
                    <option value="">-- Select Program --</option>
                    <option th:each="p : ${programs}" th:value="${p}" th:text="${p}"></option>
                </select>
            </div>

            <div class="col-md-4">
                <label class="form-label fw-bold">Select Batch</label>
                <select id="batchSelect" class="form-select" disabled>
                    <option value="">-- Choose Program First --</option>
                </select>
            </div>

            <div class="col-md-2">
                <button type="button" class="btn btn-primary w-100" onclick="loadAction()">Load</button>
            </div>
        </div>
    </div>

    <div id="displayArea" class="mt-4">
        <div th:fragment="coursesSection" th:if="${electiveGroupedMap != null}">
            <div th:each="entry : ${electiveGroupedMap}" class="container my-4">
                <div class="card shadow-sm mb-3">
                    <div class="card-header bg-light d-flex justify-content-between align-items-center">
                        <h5 class="mb-0" th:text="${entry.key[1]}">Elective Type Name</h5>
                        <span class="badge bg-secondary" th:text="${entry.key[0]}">CODE</span>
                        <form th:action="@{/admin/openfor/chooseElective}" method="post">
                            <input type="hidden" name="batch" th:value="${selectedBatch}">
                            <input type="hidden" name="program" th:value="${selectedProgram}">
                            <input type="hidden" name="termId" th:value="${selectedTermId}">
                            <input type="hidden" name="electiveCode" th:value="${entry.key[0]}">
                            <input type="hidden" name="electiveName" th:value="${entry.key[1]}">
                            <input type="hidden" name="ctpid" th:value="${entry.key[2]}">
                            <button type="submit" class="btn btn-sm btn-primary">+ Add Course</button>
                        </form>
                    </div>
                    <div class="card-body p-0">
                        <table class="table table-hover mb-0">
                            <thead class="table-dark">
                                <tr>
                                    <th style="width: 5%">S.No</th>
                                    <th style="width: 15%">Course Code</th>
                                    <th style="width: 40%">Course Name</th>
                                    <th style="width: 15%">L-T-P-C</th>
                                    <th style="width: 15%">Seats</th>
                                    <th style="width: 10%">Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="tca, iterStat : ${entry.value}">
                                    <td th:text="${iterStat.count}">1</td>
                                    <td th:text="${tca.termCourse.course.crscode}">MATH101</td>
                                    <td th:text="${tca.termCourse.course.crsname}">Mathematics</td>
                                    <td th:text="|${tca.termCourse.course.crslectures}-${tca.termCourse.course.crstutorials}-${tca.termCourse.course.crspracticals}-${tca.termCourse.course.crscreditpoints}|">
                                        3-0-2-4
                                    </td>
                                    <td style="width: 15%">
                                        <div class="input-group input-group-sm" style="max-width: 120px;">
                                            <input type="number" 
                                                th:id="'seats-' + ${tca.tcaid}" 
                                                class="form-control" 
                                                th:value="${tca.tca_seats}" 
                                                min="0">
                                            <button class="btn btn-primary" 
                                                    type="button" 
                                                    th:data-tcaid="${tca.tcaid}"
                                                    th:data-batch="${selectedBatch}"
                                                    th:data-program="${selectedProgram}"
                                                    th:data-termid="${selectedTermId}"
                                                    onclick="updateSeatsAction(this)"
                                                    title="Save Seats">
                                                <i class="bi bi-check"></i> Save
                                            </button>
                                        </div>
                                    </td>
                                    <td>
                                        <button type="button" 
                                            class="btn btn-outline-danger btn-sm" 
                                            th:data-tcaid="${tca.tcaid}"
                                            th:data-batch="${selectedBatch}"
                                            th:data-program="${selectedProgram}"
                                            th:data-termid="${selectedTermId}"
                                            onclick="removeAction(this)">
                                            Remove
                                        </button>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(entry.value)}">
                                    <td colspan="6" class="text-center text-muted py-3">No courses available for this elective type.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        function fetchBatches() {
            const programId = document.getElementById("programSelect").value;
            const batchSelect = document.getElementById("batchSelect");
            const termId = document.getElementById("currTermId").value;

            if (!programId) {
                batchSelect.innerHTML = '<option value="">-- Choose Program First --</option>';
                batchSelect.disabled = true;
                return;
            }

            // Call the background function to get batches
            fetch(`/admin/openfor/getBatches?prgname=${programId}&currTermId=${termId}`)
                .then(response => response.json())
                .then(data => {
                    console.log("Batches received from server:", data);
                    batchSelect.innerHTML = '<option value="">-- Select Batch --</option>';
                    data.forEach(batch => {
                        let opt = document.createElement("option");
                        opt.value = batch;
                        opt.text = batch;
                        batchSelect.add(opt);
                    });
                    batchSelect.disabled = false;
                });
        }

        function loadAction() {
            const batch = document.getElementById("batchSelect").value;
            const program = document.getElementById("programSelect").value;
            const termId = document.getElementById("currTermId").value;

            if (!batch || !program) {
                alert("Please select both Batch and Program");
                return;
            }

            // Using URLSearchParams to send data as a Form Post
            const params = new URLSearchParams();
            params.append('batch', batch);
            params.append('program', program);
            params.append('termId', termId);

            fetch('/admin/openfor/load', {
                method: 'POST',
                body: params,
                headers: {
                    // Include CSRF token if enabled in your security config
                    'X-CSRF-TOKEN': document.querySelector('input[name="_csrf"]')?.value 
                }
            })
            .then(response => {
                if (!response.ok) throw new Error('Network response was not ok');
                return response.text(); // Get the HTML fragment as text
            })
            .then(htmlFragment => {
                // Inject the returned HTML directly into the displayArea
                document.getElementById("displayArea").innerHTML = htmlFragment;
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById("displayArea").innerHTML = 
                    `<div class="alert alert-danger">Error loading courses.</div>`;
            });
        }

        function updateSeatsAction(btn) {
            // Get the specific input value using the unique ID we created in Thymeleaf
            const tcaId = btn.dataset.tcaid;
            const batch = btn.dataset.batch;
            const program = btn.dataset.program;
            const termId = btn.dataset.termid;

            const seatsInput = document.getElementById('seats-' + tcaId);
            const seatsValue = seatsInput.value;

            const params = new URLSearchParams();
            params.append('tcaId', tcaId);
            params.append('seats', seatsValue);
            params.append('batch', batch);
            params.append('program', program);
            params.append('termId', termId);

            fetch('/admin/openfor/updateSeats', {
                method: 'POST',
                body: params,
                headers: {
                    'X-CSRF-TOKEN': document.querySelector('input[name="_csrf"]')?.value 
                }
            })
            .then(response => {
                if (!response.ok) throw new Error('Update failed');
                return response.text();
            })
            .then(htmlFragment => {
                document.getElementById("displayArea").innerHTML = htmlFragment;
                // Optional: Add a small toast or alert to show success
                console.log("Seats updated successfully for TCA ID: " + tcaId);
            })
            .catch(error => {
                console.error('Error:', error);
                alert("Could not update seats. Please try again.");
            });
        }

        function removeAction(btn) {
            // Extract data from the button's data attributes
            const tcaId = btn.dataset.tcaid;
            const batch = btn.dataset.batch;
            const program = btn.dataset.program;
            const termId = btn.dataset.termid;

            console.log("Removing:", {tcaId, batch, program, termId});
            
            if (!confirm("Are you sure you want to remove this course?")) return;

            const params = new URLSearchParams();
            params.append('tcaId', tcaId);
            params.append('batch', batch);
            params.append('program', program);
            params.append('termId', termId);

            fetch('/admin/openfor/remove', {
                method: 'POST',
                body: params,
                headers: {
                    'X-CSRF-TOKEN': document.querySelector('input[name="_csrf"]')?.value 
                }
            })
            .then(response => response.text())
            .then(htmlFragment => {
                document.getElementById("displayArea").innerHTML = htmlFragment;
            })
            .catch(error => console.error('Error:', error));
        }

        window.onload = function() {
            const preBatch = /*[[${preSelectedBatch}]]*/ null;
            const preProgram = /*[[${preSelectedProgram}]]*/ null;

            if(preBatch && preBatch !== 'null') {
                document.getElementById("batchSelect").value = preBatch;
                fetchPrograms(); 
                
                setTimeout(() => {
                    if(preProgram && preProgram !== 'null') {
                        document.getElementById("programSelect").value = preProgram;
                        
                        const displayArea = document.getElementById("displayArea");
                        // Only trigger if server didn't already render it
                        if (displayArea.children.length === 0 || displayArea.innerHTML.trim() === "") {
                            loadAction();
                        }
                    }
                }, 500); 
            }
        };
    </script>

    <div th:replace="fragments/footer :: footer"></div>
</body>
</html>
