<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Save Add/Drop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
</head>


<body>

<!-- HEADER -->
<div th:replace="fragments/header :: header"></div>

<!-- NAVBAR -->
<div th:replace="fragments/navbar :: navbar"></div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Upload Student Data</h4>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/admin/addDropSave/process}" method="post" enctype="multipart/form-data">
                            
                            <div class="mb-3">
                                <label for="formFile" class="form-label fw-bold">Select Excel File (.xlsx or .xls)</label>
                                <input class="form-control" type="file" name="file" id="formFile" accept=".xlsx, .xls" required>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-success">
                                    <i class="bi bi-cloud-upload"></i> Upload Add/Drop Result
                                </button>
                            </div>
                        </form>

                        <div th:if="${success}" class="alert alert-success mt-3" th:text="${success}"></div>
                        <div th:if="${error}" class="alert alert-danger mt-3" th:text="${error}"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="fragments/footer :: footer"></div>
</body>
</html>
